openapi: 3.1.0
info:
  title: WFI Scientific Canon Reader
  version: "0.1.0"
  description: >
    Read selected live files from the public WFI Scientific Canon repository.
    This action is read-only and retrieves WFF methodology, terminology,
    module guidance, resolved methodological decisions, deprecated terms,
    and AI-use rules from GitHub.

servers:
  - url: https://raw.githubusercontent.com

paths:
  /welfare-footprint-institute/wfi-scientific-canon-public/main/README.md:
    get:
      operationId: getRepositoryReadme
      summary: Get the repository README
      responses:
        "200":
          description: Repository README Markdown
          content:
            text/plain:
              schema:
                type: string

  /welfare-footprint-institute/wfi-scientific-canon-public/main/AI_USE.md:
    get:
      operationId: getAiUseRules
      summary: Get responsible AI-use rules for the canon
      responses:
        "200":
          description: AI-use rules Markdown
          content:
            text/plain:
              schema:
                type: string

  /welfare-footprint-institute/wfi-scientific-canon-public/main/CANON_MAP.md:
